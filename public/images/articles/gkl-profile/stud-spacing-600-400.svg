<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
    <rect width="1600" height="900" fill="#ffffff"/>
    <defs>
      <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
        <path d="M0,4 L8,0 L8,8 Z" fill="#f28c28"/>
      </marker>
      <marker id="arrS" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
        <path d="M8,4 L0,0 L0,8 Z" fill="#f28c28"/>
      </marker>
    </defs>
    <rect x="24" y="24" width="1552" height="852" rx="24" fill="#ffffff" stroke="#d7e1ea"/><text x="64" y="84" fill="#18324a" font-family="Arial" font-size="42" font-weight="700">Шаг стоек 600 мм и 400 мм</text><text x="64" y="122" fill="#66788a" font-family="Arial" font-size="24">Как влияет расстояние между стойками на каркас перегородки</text><rect x="90" y="180" width="695" height="610" rx="20" fill="#f7fafc" stroke="#d7e1ea"/><text x="114" y="220" fill="#18324a" font-family="Arial" font-size="22" font-weight="700">Шаг 600 мм</text><text x="114" y="248" fill="#66788a" font-family="Arial" font-size="16">Стандартный вариант для большинства перегородок</text><path d="M 180 280 V 316 H 700 V 280" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 180 650 V 686 H 700 V 650" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 220.0 350 H 230.0 M 256.0 350 H 266.0 M 220.0 350 V 600 H 266.0 V 350" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 380.0 350 H 390.0 M 416.0 350 H 426.0 M 380.0 350 V 600 H 426.0 V 350" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 540.0 350 H 550.0 M 576.0 350 H 586.0 M 540.0 350 V 600 H 586.0 V 350" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 700.0 350 H 710.0 M 736.0 350 H 746.0 M 700.0 350 V 600 H 746.0 V 350" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><line x1="243.0" y1="720" x2="403.0" y2="720" stroke="#f28c28" stroke-width="3" marker-start="url(#arrS)" marker-end="url(#arr)"/><text x="323.0" y="700" text-anchor="middle" fill="#f28c28" font-size="22" font-family="Arial" font-weight="700">600 мм</text><rect x="815" y="180" width="695" height="610" rx="20" fill="#f7fafc" stroke="#d7e1ea"/><text x="839" y="220" fill="#18324a" font-family="Arial" font-size="22" font-weight="700">Шаг 400 мм</text><text x="839" y="248" fill="#66788a" font-family="Arial" font-size="16">Используют при повышенной нагрузке или более тонком профиле</text><path d="M 905 280 V 316 H 1425 V 280" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 905 650 V 686 H 1425 V 650" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 945.0 350 H 955.0 M 981.0 350 H 991.0 M 945.0 350 V 600 H 991.0 V 350" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 1041.0 350 H 1051.0 M 1077.0 350 H 1087.0 M 1041.0 350 V 600 H 1087.0 V 350" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 1137.0 350 H 1147.0 M 1173.0 350 H 1183.0 M 1137.0 350 V 600 H 1183.0 V 350" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 1233.0 350 H 1243.0 M 1269.0 350 H 1279.0 M 1233.0 350 V 600 H 1279.0 V 350" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 1329.0 350 H 1339.0 M 1365.0 350 H 1375.0 M 1329.0 350 V 600 H 1375.0 V 350" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 1425.0 350 H 1435.0 M 1461.0 350 H 1471.0 M 1425.0 350 V 600 H 1471.0 V 350" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><line x1="968.0" y1="720" x2="1064.0" y2="720" stroke="#f28c28" stroke-width="3" marker-start="url(#arrS)" marker-end="url(#arr)"/><text x="1016.0" y="700" text-anchor="middle" fill="#f28c28" font-size="22" font-family="Arial" font-weight="700">400 мм</text><text x="90" y="845" fill="#66788a" font-size="20" font-family="Arial">Уменьшение шага стоек повышает жёсткость каркаса, но увеличивает расход профиля.</text>
    </svg>