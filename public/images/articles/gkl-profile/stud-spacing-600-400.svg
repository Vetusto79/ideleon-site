<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none"><rect width="1600" height="900" fill="#ffffff"/><rect x="24" y="24" width="1552" height="852" rx="24" fill="#ffffff" stroke="#d9e3ec" stroke-width="2"/><text x="80" y="90" fill="#12324a" font-size="40" font-family="Arial" font-weight="700">Шаг стоек 600 мм и 400 мм</text><text x="80" y="130" fill="#6b7785" font-size="22" font-family="Arial">Частота установки стоек влияет на расход профиля</text><rect x="100" y="190" width="680" height="560" rx="24" fill="#f5f8fb" stroke="#d9e3ec"/><text x="130" y="245" fill="#12324a" font-size="32" font-family="Arial" font-weight="700">Шаг 600 мм</text><rect x="150" y="290" width="580" height="320" rx="12" fill="#ffffff" stroke="#d9e3ec"/><rect x="170" y="320" width="540" height="24" rx="6" fill="#12324a"/><rect x="170" y="556" width="540" height="24" rx="6" fill="#12324a"/><rect x="210" y="344" width="40" height="212" rx="8" fill="#ffffff" stroke="#2a6ea6" stroke-width="8"/><rect x="390" y="344" width="40" height="212" rx="8" fill="#ffffff" stroke="#2a6ea6" stroke-width="8"/><rect x="570" y="344" width="40" height="212" rx="8" fill="#ffffff" stroke="#2a6ea6" stroke-width="8"/><path d="M 230 650 H 410" stroke="#f28c28" stroke-width="6" marker-start="url(#arr)" marker-end="url(#arr)"/><text x="275.0" y="638" fill="#f28c28" font-size="22" font-family="Arial" font-weight="700">600 мм</text><text x="130" y="715" fill="#6b7785" font-size="20" font-family="Arial">Меньше расход профиля</text><rect x="820" y="190" width="680" height="560" rx="24" fill="#f5f8fb" stroke="#d9e3ec"/><text x="850" y="245" fill="#12324a" font-size="32" font-family="Arial" font-weight="700">Шаг 400 мм</text><rect x="870" y="290" width="580" height="320" rx="12" fill="#ffffff" stroke="#d9e3ec"/><rect x="890" y="320" width="540" height="24" rx="6" fill="#12324a"/><rect x="890" y="556" width="540" height="24" rx="6" fill="#12324a"/><rect x="930" y="344" width="40" height="212" rx="8" fill="#ffffff" stroke="#2a6ea6" stroke-width="8"/><rect x="1050" y="344" width="40" height="212" rx="8" fill="#ffffff" stroke="#2a6ea6" stroke-width="8"/><rect x="1170" y="344" width="40" height="212" rx="8" fill="#ffffff" stroke="#2a6ea6" stroke-width="8"/><rect x="1290" y="344" width="40" height="212" rx="8" fill="#ffffff" stroke="#2a6ea6" stroke-width="8"/><path d="M 950 650 H 1070" stroke="#f28c28" stroke-width="6" marker-start="url(#arr)" marker-end="url(#arr)"/><text x="965.0" y="638" fill="#f28c28" font-size="22" font-family="Arial" font-weight="700">400 мм</text><text x="850" y="715" fill="#6b7785" font-size="20" font-family="Arial">Больше расход профиля</text><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="4" refY="4" orient="auto"><path d="M0,4 L8,0 L8,8 Z" fill="#f28c28"/></marker></defs><text x="80" y="800" fill="#6b7785" font-size="20" font-family="Arial">Шаг 400 мм увеличивает количество стоек примерно в 1,5 раза по сравнению с шагом 600 мм.</text></svg>