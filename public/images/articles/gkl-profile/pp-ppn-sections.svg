nt-size="20" font-family="Arial">Направляющий профиль по периметру</text><text x="170" y="790" fill="#6b7785" font-size="20" font-family="Arial">ПП формирует основную плоскость каркаса, а ППН задаёт контур и принимает торцы потолочных профилей.</text></svg>