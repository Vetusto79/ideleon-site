<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none"><rect width="1600" height="900" fill="#ffffff"/><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto"><path d="M0,5 L10,0 L10,10 Z" fill="#f28c28"/></marker><marker id="arrowStart" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto"><path d="M10,5 L0,0 L0,10 Z" fill="#f28c28"/></marker></defs><rect x="24" y="24" width="1552" height="852" rx="24" fill="#ffffff" stroke="#d6e0ea"/><text x="70" y="90" fill="#12324a" font-size="42" font-family="Arial" font-weight="700">Разрезы ПП 60×27 и ППН 28×27</text><text x="70" y="128" fill="#627285" font-size="24" font-family="Arial">Потолочная пара для каркасов из гипсокартона</text><rect x="110" y="185" width="640" height="590" rx="22" fill="#f6f9fc" stroke="#d6e0ea"/><text x="162" y="263" fill="#12324a" font-size="36" font-family="Arial" font-weight="700">ПП 60×27</text><text x="162" y="301" fill="#627285" font-size="22" font-family="Arial">Основной потолочный профиль</text><path d="M 270 405 V 550 H 520 V 405" stroke="#12324a" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/><line x1="270" y1="405" x2="310" y2="405" stroke="#12324a" stroke-width="16" stroke-linecap="round"/><line x1="480" y1="405" x2="520" y2="405" stroke="#12324a" stroke-width="16" stroke-linecap="round"/><line x1="270" y1="550" x2="270" y2="615" stroke="#f28c28" stroke-width="2"/><line x1="520" y1="550" x2="520" y2="615" stroke="#f28c28" stroke-width="2"/><line x1="270" y1="615" x2="520" y2="615" stroke="#f28c28" stroke-width="3" marker-start="url(#arrowStart)" marker-end="url(#arrow)"/><text x="395.0" y="607" fill="#f28c28" font-size="20" font-family="Arial" font-weight="700" text-anchor="middle">60 мм</text><line x1="520" y1="405" x2="570" y2="405" stroke="#f28c28" stroke-width="2"/><line x1="520" y1="550" x2="570" y2="550" stroke="#f28c28" stroke-width="2"/><line x1="570" y1="405" x2="570" y2="550" stroke="#f28c28" stroke-width="3" marker-start="url(#arrowStart)" marker-end="url(#arrow)"/><text x="584" y="483.5" fill="#f28c28" font-size="20" font-family="Arial" font-weight="700">27 мм</text><rect x="845" y="185" width="640" height="590" rx="22" fill="#f6f9fc" stroke="#d6e0ea"/><text x="897" y="263" fill="#12324a" font-size="36" font-family="Arial" font-weight="700">ППН 28×27</text><text x="897" y="301" fill="#627285" font-size="22" font-family="Arial">Направляющий профиль по периметру</text><path d="M 1025 405 V 550 H 1235 V 405" stroke="#12324a" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/><line x1="1025" y1="550" x2="1025" y2="615" stroke="#f28c28" stroke-width="2"/><line x1="1235" y1="550" x2="1235" y2="615" stroke="#f28c28" stroke-width="2"/><line x1="1025" y1="615" x2="1235" y2="615" stroke="#f28c28" stroke-width="3" marker-start="url(#arrowStart)" marker-end="url(#arrow)"/><text x="1130.0" y="607" fill="#f28c28" font-size="20" font-family="Arial" font-weight="700" text-anchor="middle">28 мм</text><line x1="1235" y1="405" x2="1285" y2="405" stroke="#f28c28" stroke-width="2"/><line x1="1235" y1="550" x2="1285" y2="550" stroke="#f28c28" stroke-width="2"/><line x1="1285" y1="405" x2="1285" y2="550" stroke="#f28c28" stroke-width="3" marker-start="url(#arrowStart)" marker-end="url(#arrow)"/><text x="1299" y="483.5" fill="#f28c28" font-size="20" font-family="Arial" font-weight="700">27 мм</text><text x="70" y="865" fill="#627285" font-size="22" font-family="Arial">ПП формирует основную плоскость каркаса, а ППН задаёт контур и принимает торцы потолочных профилей.</text></svg>