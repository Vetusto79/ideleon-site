    <text x="48" y="64" fill="#17324d" font-family="Arial" font-size="40" font-weight="700" text-anchor="start">Разрезы ПП 60×27 и ППН 28×27</text><text x="48" y="102" fill="#5f7186" font-family="Arial" font-size="22" font-weight="400" text-anchor="start">Потолочная пара для каркасов из гипсокартона по ТУ Албес</text><rect x="90" y="150" width="560" height="520" rx="22" fill="#f7fafc" stroke="#d7e1ea" stroke-width="2"/><rect x="950" y="150" width="560" height="520" rx="22" fill="#f7fafc" stroke="#d7e1ea" stroke-width="2"/><text x="140" y="220" fill="#17324d" font-family="Arial" font-size="32" font-weight="700" text-anchor="start">ПП 60×27</text><text x="140" y="260" fill="#5f7186" font-family="Arial" font-size="16" font-weight="400" text-anchor="start">Основной потолочный профиль</text><path d="M 264 375 H 250 Q 240 375 240 389 V 470" fill="none" stroke="#173a5e" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/><path d="M 436 375 H 450 Q 460 375 460 389 V 470" fill="none" stroke="#173a5e" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/><line x1="240" y1="470" x2="460" y2="470" stroke="#173a5e" stroke-width="8" stroke-linecap="round"/><path d="M 282.8 470 q 5.0 -7 10.0 0 q 5.0 7 10.0 0" fill="none" stroke="#173a5e" stroke-width="6" stroke-linecap="round"/><path d="M 340.0 470 q 5.0 -7 10.0 0 q 5.0 7 10.0 0" fill="none" stroke="#173a5e" stroke-width="6" stroke-linecap="round"/><path d="M 397.2 470 q 5.0 -7 10.0 0 q 5.0 7 10.0 0" fill="none" stroke="#173a5e" stroke-width="6" stroke-linecap="round"/>
