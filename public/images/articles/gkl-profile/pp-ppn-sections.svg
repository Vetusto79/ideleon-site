<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#ffffff"/><defs><marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,4 L8,0 L8,8 Z" fill="#f28c28"/></marker><marker id="arrS" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M8,4 L0,0 L0,8 Z" fill="#f28c28"/></marker></defs><text x="48" y="66" fill="#18324a" font-family="Arial" font-size="40" font-weight="700" text-anchor="start">Разрезы ПП 60×27 и ППН 28×27</text><text x="48" y="104" fill="#66788a" font-family="Arial" font-size="22" font-weight="400" text-anchor="start">Потолочная пара для каркасов из гипсокартона по ТУ Албес</text><rect x="120" y="150" width="540" height="520" rx="24" fill="#f7fafc" stroke="#d7e1ea" stroke-width="2"/><text x="168" y="220" fill="#18324a" font-family="Arial" font-size="34" font-weight="700" text-anchor="start">ПП 60×27</text><text x="168" y="260" fill="#66788a" font-family="Arial" font-size="18" font-weight="400" text-anchor="start">Основной потолочный профиль</text><path d="M 273 360 H 467 q 8 0 8 8 v 8 q 0 8 -8 8 h -64.4 v 54 q 0 8 -8 8 h -41.4 q -8 0 -8 -8 v -54 h -64.4 q -8 0 -8 -8 v -8 q 0 -8 8 -8" fill="none" stroke="#183b5b" stroke-width="10" stroke-linejoin="round" stroke-linecap="round"/><line x1="255" y1="376" x2="255" y2="470" stroke="#183b5b" stroke-width="10" stroke-linecap="round"/><line x1="485" y1="376" x2="485" y2="470" stroke="#183b5b" stroke-width="10" stroke-linecap="round"/><line x1="255" y1="470" x2="485" y2="470" stroke="#183b5b" stroke-width="10" stroke-linecap="round"/><path d="M 305.4 470 q 7 -12 14 0" fill="none" stroke="#183b5b" stroke-width="7" stroke-linecap="round"/><path d="M 356.0 470 q 7 -12 14 0" fill="none" stroke="#183b5b" stroke-width="7" stroke-linecap="round"/><path d="M 406.6 470 q 7 -12 14 0" fill="none" stroke="#183b5b" stroke-width="7" stroke-linecap="round"/><line x1="255" y1="494" x2="255" y2="526" stroke="#f28c28" stroke-width="2"/><line x1="485" y1="494" x2="485" y2="526" stroke="#f28c28" stroke-width="2"/><line x1="255" y1="510" x2="485" y2="510" stroke="#f28c28" stroke-width="2.5" marker-start="url(#arrS)" marker-end="url(#arr)"/><text x="370.0" y="502" fill="#f28c28" font-family="Arial" font-size="18" font-weight="700" text-anchor="middle">60 мм</text><line x1="535" y1="360" x2="567" y2="360" stroke="#f28c28" stroke-width="2"/><line x1="535" y1="470" x2="567" y2="470" stroke="#f28c28" stroke-width="2"/><line x1="551" y1="360" x2="551" y2="470" stroke="#f28c28" stroke-width="2.5" marker-start="url(#arrS)" marker-end="url(#arr)"/><text x="565" y="421.0" fill="#f28c28" font-family="Arial" font-size="18" font-weight="700" text-anchor="start">27 мм</text><rect x="940" y="150" width="540" height="520" rx="24" fill="#f7fafc" stroke="#d7e1ea" stroke-width="2"/><text x="988" y="220" fill="#18324a" font-family="Arial" font-size="34" font-weight="700" text-anchor="start">ППН 28×27</text><text x="988" y="260" fill="#66788a" font-family="Arial" font-size="18" font-weight="400" text-anchor="start">Направляющий профиль по периметру</text><path d="M 1085 365 V 470 H 1265 V 365" fill="none" stroke="#183b5b" stroke-width="10" stroke-linejoin="round" stroke-linecap="round"/><line x1="1085" y1="494" x2="1085" y2="526" stroke="#f28c28" stroke-width="2"/><line x1="1265" y1="494" x2="1265" y2="526" stroke="#f28c28" stroke-width="2"/><line x1="1085" y1="510" x2="1265" y2="510" stroke="#f28c28" stroke-width="2.5" marker-start="url(#arrS)" marker-end="url(#arr)"/><text x="1175.0" y="502" fill="#f28c28" font-family="Arial" font-size="18" font-weight="700" text-anchor="middle">28 мм</text><line x1="1315" y1="365" x2="1347" y2="365" stroke="#f28c28" stroke-width="2"/><line x1="1315" y1="470" x2="1347" y2="470" stroke="#f28c28" stroke-width="2"/><line x1="1331" y1="365" x2="1331" y2="470" stroke="#f28c28" stroke-width="2.5" marker-start="url(#arrS)" marker-end="url(#arr)"/><text x="1345" y="423.5" fill="#f28c28" font-family="Arial" font-size="18" font-weight="700" text-anchor="start">27 мм</text><text x="140" y="760" fill="#66788a" font-family="Arial" font-size="24" font-weight="400" text-anchor="start">ПП формирует основную плоскость каркаса, а ППН задаёт контур и принимает торцы потолочных профилей.</text></svg>