    <rect x="24" y="24" width="1552" height="852" rx="24" fill="#ffffff" stroke="#d7e1ea"/><text x="64" y="84" fill="#18324a" font-family="Arial" font-size="42" font-weight="700">Схема усиления / сдвоенной стойки</text><text x="64" y="122" fill="#66788a" font-family="Arial" font-size="24">Один из способов усилить каркас из тонкого профиля</text><rect x="90" y="180" width="650" height="620" rx="20" fill="#f7fafc" stroke="#d7e1ea"/><text x="114" y="220" fill="#18324a" font-family="Arial" font-size="22" font-weight="700">Обычная стойка</text><text x="114" y="248" fill="#66788a" font-family="Arial" font-size="16">Базовый вариант каркаса</text><path d="M 230 270 V 306 H 610 V 270" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 230 680 V 716 H 610 V 680" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 395 350 H 407 M 443 350 H 455 M 395 350 V 600 H 455 V 350" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><text x="330" y="770" fill="#66788a" font-size="22" font-family="Arial">Одна стойка ПС внутри направляющих ПН</text><rect x="860" y="180" width="650" height="620" rx="20" fill="#f7fafc" stroke="#d7e1ea"/><text x="884" y="220" fill="#18324a" font-family="Arial" font-size="22" font-weight="700">Сдвоенная стойка</text><text x="884" y="248" fill="#66788a" font-family="Arial" font-size="16">Усиление за счёт вложения двух стоек</text><path d="M 1000 270 V 306 H 1380 V 270" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 1000 680 V 716 H 1380 V 680" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 1145 350 H 1157 M 1193 350 H 1205 M 1145 350 V 600 H 1205 V 350" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 1162 366 H 1174 M 1210 366 H 1222 M 1162 366