<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="770" viewBox="0 0 760 770" role="img" aria-labelledby="title desc">
  <title id="title">Одинарная и сдвоенная стойка ПС внутри направляющего ПН</title>
  <desc id="desc">Техническая аксонометрия открытого U-профиля ПН и C-профиля ПС. Во втором узле два C-профиля развёрнуты навстречу и соединены в короб.</desc>
