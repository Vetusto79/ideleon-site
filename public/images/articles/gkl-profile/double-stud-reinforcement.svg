<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="740" height="780" viewBox="0 0 740 780" role="img" aria-labelledby="title desc">
  <title id="title">Одинарная и сдвоенная стойка в направляющем профиле</title>
  <desc id="desc">Слева в верхнем блоке одна стойка ПС внутри ПН. В нижнем блоке два профиля ПС соединены навстречу друг другу в замкнутое усиленное сечение, при этом ПН остаётся видимым.</desc>
  <defs>
    <marker id="orangeArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#F47A20"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0B2340" flood-opacity=".10"/>
    </filter>
    <g id="floorTrack">
      <path d="M0 35 H470 L498 10 H28 Z" fill="#E8F0F5" stroke="#0B2340" stroke-width="4" stroke-linejoin="round"/>
      <path d="M0 35 H470 V62 H0 Z" fill="#C7D8E4" stroke="#0B2340" stroke-width="4" stroke-linejoin="round"/>
      <path d="M470 35 L498 10 V37 L470 62 Z" fill="#B7CBD8" stroke="#0B2340" stroke-width="4" stroke-linejoin="round"/>
      <path d="M28 10 H498" fill="none" stroke="#0B2340" stroke-width="4"/>
    </g>
    <g id="singleStud3d">
      <rect x="0" y="0" width="56" height="158" fill="#E8F0F5" stroke="#0B2340" stroke-width="4"/>
      <path d="M56 0 L83 -17 V141 L56 158 Z" fill="#C7D8E4" stroke="#0B2340" stroke-width="4" stroke-linejoin="round"/>
      <path d="M0 0 L27 -17 H83 L56 0 Z" fill="#F7FAFC" stroke="#0B2340" stroke-width="4" stroke-linejoin="round"/>
      <path d="M27 -17 V-5 H70" fill="none" stroke="#0B2340" stroke-width="4" stroke-linejoin="round"/>
      <path d="M0 158 L27 141 H83" fill="none" stroke="#0B2340" stroke-width="4" stroke-linejoin="round"/>
    </g>
  </defs>

  <rect width="740" height="780" rx="24" fill="#F7FAFC"/>
  <text x="38" y="52" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="29" font-weight="700" fill="#0B2340">Одинарная и сдвоенная стойка</text>
  <text x="38" y="80" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="16" fill="#50677C">ПС устанавливается внутрь направляющего ПН</text>

  <g transform="translate(28 102)">
    <rect width="684" height="282" rx="18" fill="#FFFFFF" stroke="#D8E2EA"/>
    <text x="28" y="42" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="22" font-weight="700" fill="#0B2340">Одна стойка ПС</text>
    <text x="28" y="68" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="15" fill="#50677C">Стандартный узел</text>
    <g transform="translate(112 190)">
      <use href="#floorTrack"/>
      <g transform="translate(207 -145)"><use href="#singleStud3d"/></g>
      <circle cx="244" cy="45" r="7" fill="#F47A20"/>
      <text x="510" y="39" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="15" font-weight="700" fill="#0B2340">ПН видим</text>
      <line x1="492" y1="35" x2="462" y2="42" stroke="#F47A20" stroke-width="3" marker-end="url(#orangeArrow)"/>
    </g>
  </g>

  <g transform="translate(28 402)">
    <rect width="684" height="326" rx="18" fill="#FFFFFF" stroke="#D8E2EA"/>
    <text x="28" y="42" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="22" font-weight="700" fill="#0B2340">Два профиля ПС — усиленный узел</text>
    <text x="28" y="68" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="15" fill="#50677C">Профили развёрнуты навстречу и соединены в короб</text>
    <g transform="translate(112 215)">
      <use href="#floorTrack"/>
      <g transform="translate(190 -145)">
        <rect x="0" y="0" width="56" height="158" fill="#E8F0F5" stroke="#0B2340" stroke-width="4"/>
        <path d="M56 0 L83 -17 V141 L56 158 Z" fill="#C7D8E4" stroke="#0B2340" stroke-width="4"/>
        <path d="M0 0 L27 -17 H83 L56 0 Z" fill="#F7FAFC" stroke="#0B2340" stroke-width="4"/>
        <path d="M27 -17 V-5 H70" fill="none" stroke="#0B2340" stroke-width="4"/>
        <path d="M56 0 L83 -17 H110 L83 0 Z" fill="#FFF1E6" stroke="#F47A20" stroke-width="4"/>
        <rect x="56" y="0" width="27" height="158" fill="#FFF1E6" fill-opacity=".72" stroke="#F47A20" stroke-width="4"/>
        <path d="M83 0 H110 V158 H83" fill="none" stroke="#F47A20" stroke-width="4" stroke-linejoin="round"/>
        <circle cx="70" cy="55" r="6" fill="#F47A20"/>
        <circle cx="70" cy="108" r="6" fill="#F47A20"/>
      </g>
      <line x1="410" y1="-70" x2="302" y2="-70" stroke="#F47A20" stroke-width="3" marker-end="url(#orangeArrow)"/>
      <text x="420" y="-76" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="15" font-weight="700" fill="#0B2340">место соединения</text>
      <circle cx="250" cy="45" r="7" fill="#F47A20"/>
    </g>
    <g transform="translate(496 87)">
      <circle cx="76" cy="70" r="62" fill="#F7FAFC" stroke="#D8E2EA" stroke-width="2"/>
      <text x="76" y="17" text-anchor="middle" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="12" fill="#50677C">вид сверху</text>
      <path d="M42 39 H102 V52 H54 V88 H102 V101 H42 Z" fill="none" stroke="#0B2340" stroke-width="7" stroke-linejoin="round"/>
      <path d="M110 39 H50 V52 H98 V88 H50 V101 H110 Z" fill="none" stroke="#F47A20" stroke-width="7" stroke-linejoin="round"/>
      <circle cx="50" cy="47" r="4" fill="#F47A20"/>
      <circle cx="102" cy="93" r="4" fill="#F47A20"/>
    </g>
  </g>

  <text x="370" y="758" text-anchor="middle" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="13" fill="#6D7F8E">Сечения ПС и ПН выполнены по геометрии профилей из ТУ Албес</text>
</svg>
