<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none"><rect width="1600" height="900" fill="#ffffff"/><rect x="24" y="24" width="1552" height="852" rx="24" fill="#ffffff" stroke="#d9e3ec" stroke-width="2"/><text x="80" y="90" fill="#12324a" font-size="40" font-family="Arial" font-weight="700">Усиление стоек и сдвоенный профиль</text><text x="80" y="130" fill="#6b7785" font-size="22" font-family="Arial">Пример конструктивного усиления для ответственных участков</text><rect x="110" y="210" width="580" height="530" rx="24" fill="#f5f8fb" stroke="#d9e3ec"/><rect x="910" y="210" width="580" height="530" rx="24" fill="#f5f8fb" stroke="#d9e3ec"/><text x="150" y="270" fill="#12324a" font-size="30" font-family="Arial" font-weight="700">Одинарная стойка</text><text x="950" y="270" fill="#12324a" font-size="30" font-family="Arial" font-weight="700">Сдвоенная стойка</text><rect x="220" y="320" width="90" height="280" rx="12" fill="#ffffff" stroke="#2a6ea6" stroke-width="10"/><rect x="1020" y="320" width="90" height="280" rx="12" fill="#ffffff" stroke="#2a6ea6" stroke-width="10"/><rect x="1110" y="320" width="90" height="280" rx="12" fill="#ffffff" stroke="#2a6ea6" stroke-width="10"/><line x1="1120" y1="350" x2="1190" y2="350" stroke="#f28c28" stroke-width="6"/><line x1="1120" y1="420" x2="1190" y2="420" stroke="#f28c28" stroke-width="6"/><line x1="1120" y1="490" x2="1190" y2="490" stroke="#f28c28" stroke-width="6"/><text x="1230" y="362" fill="#203040" font-size="20" font-family="Arial">крепление между стойками</text><text x="1230" y="432" fill="#203040" font-size="20" font-family="Arial">повышение жёсткости</text><text x="1230" y="502" fill="#203040" font-size="20" font-family="Arial">усиление проёмов</text><text x="170" y="650" fill="#6b7785" font-size="20" font-family="Arial">Типовое решение для обычных участков перегородки.</text><text x="950" y="650" fill="#6b7785" font-size="20" font-family="Arial">Применяют, когда нужно усилить проём, стойку или узел.</text><text x="110" y="790" fill="#6b7785" font-size="20" font-family="Arial">Если тонкий профиль приходится сдваивать, расход металла резко растёт — именно поэтому дешёвый метр не всегда означает дешёвую конструкцию.</text></svg>