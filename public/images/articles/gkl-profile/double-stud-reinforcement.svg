    </marker>
    <style>
      text { font-family: Arial, 'DejaVu Sans', sans-serif; }
      .title { font-size: 29px; font-weight: 700; fill: #0B2340; }
      .subtitle { font-size: 17px; fill: #50677C; }
      .panel-title { font-size: 23px; font-weight: 700; fill: #0B2340; }
      .panel-sub { font-size: 15px; fill: #50677C; }
