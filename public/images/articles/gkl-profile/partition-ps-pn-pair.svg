    <text x="48" y="64" fill="#17324d" font-family="Arial" font-size="40" font-weight="700" text-anchor="start">Схема перегородочной пары ПС + ПН</text><text x="48" y="102" fill="#5f7186" font-family="Arial" font-size="22" font-weight="400" text-anchor="start">Как стоечный профиль устанавливается в направляющий</text><rect x="80" y="150" width="1440" height="660" rx="22" fill="#f7fafc" stroke="#d7e1ea" stroke-width="2"/><text x="130" y="210" fill="#17324d" font-family="Arial" font-size="24" font-weight="700" text-anchor="start">ПС 50×50 внутри ПН 50×40</text><path d="M 286 400 H 276 Q 270 400 270 410 V 520" fill="none" stroke="#173a5e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 594 400 H 604 Q 610 400 610 410 V 520" fill="none" stroke="#173a5e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><line x1="270" y1="520" x2="610" y2="520" stroke="#173a5e" stroke-width="8" stroke-linecap="round"/><path d="M 380.0 520 q 4.5 -6 9.0 0 q 4.5 6 9.0 0" fill="none" stroke="#173a5e" stroke-width="6" stroke-linecap="round"/><path d="M 482.0 520 q 4.5 -6 9.0 0 q 4.5 6 9.0 0" fill="none" stroke="#173a5e" stroke-width="6" stroke-linecap="round"/><path d="M 379 315 H 367 Q 355 315 355 327 V 490" fill="none" stroke="#f28a1f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 501 315 H 513 Q 525 315 525 327 V 490" fill="none" stroke="#f28a1f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><line x1="355" y1="490" x2="525" y2="490" stroke="#f28a1f" stroke-width="8" stroke-linecap="round"/><path d="M 390.2 490 q 4.5 -6 9.0 0 q 4.5 6 9.0 0" fill="none" stroke="#f28a1f" stroke-width="6" stroke-linecap="round"/><path d="M 471.8 490 q 4.5 -6 9.0 0 q 4.5 6 9.0 0" fill="none" stroke="#f28a1f" stroke-width="6" stroke-linecap="round"/><text x="760" y="360" fill="#f28a1f" font-family="Arial" font-size="28" font-weight="700" text-anchor="start">ПС 50×50</text><text x="760" y="398" fill="#5f7186" font-family="Arial" font-size="18" font-weight="400" text-anchor="start">стоечный профиль</text><text x="760" y="470" fill="#173a5e" font-family="Arial" font-size="28" font-weight="700" text-anchor="start">ПН 50×40</text><text x="760" y="508" fill="#5f7186" font-family="Arial" font-size="18" font-weight="400" text-anchor="start">направляющий профиль</text>
