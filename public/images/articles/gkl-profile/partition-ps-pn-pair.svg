oke="#12324a" stroke-width="12" stroke-linecap="round"/><text x="590" y="610" fill="#12324a" font-size="24" font-family="Arial" font-weight="700">ПС</text><path d="M 840 330 V 580 H 930 V 330" stroke="#12324a" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/><line x1="840" y1="330" x2="858" y2="330" stroke="#12324a" stroke-width="12" stroke-linecap="round"/><line x1="912" y1="330" x2="930" y2="330" stroke="#12324a" stroke-width="12" stroke-linecap="round"/><text x="860" y="610" fill="#12324a" font-size="24" font-family="Arial" font-weight="700">ПС</text><path d="M 1110 330 V 580 H 1200 V 330" stroke="#12324a" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/><line x1="1110" y1="330" x2="1128" y2="330" stroke="#12324a" stroke-width="12" stroke-linecap="round"/><line x1="1182" y1="330" x2="1200" y2="330" stroke="#12324a" stroke-width="12" stroke-linecap="round"/><text x="1130" y="610" fill="#12324a" font-size="24" font-family="Arial" font-weight="700">ПС</text><line x1="345" y1="735" x2="615" y2="735" stroke="#f28c28" stroke-width="4" marker-start="url(#arrowStart)" marker-end="url(#arrow)"/><text x="480" y="718" fill="#f28c28" font-size="24" font-family="Arial" font-weight="700" text-anchor="middle">обычно 600 мм</text><text x="130" y="820" fill="#627285" font-size="22" font-family="Arial">Стоечный профиль ПС ставится внутрь направляющего ПН и формирует несущий каркас перегородки.</text></svg>