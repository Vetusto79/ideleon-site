c28" font-family="Arial" font-size="18" font-weight="700" text-anchor="middle">50 мм</text><line x1="784" y1="320" x2="816" y2="320" stroke="#f28c28" stroke-width="2"/><line x1="784" y1="570" x2="816" y2="570" stroke="#f28c28" stroke-width="2"/><line x1="800" y1="320" x2="800" y2="570" stroke="#f28c28" stroke-width="2.5" marker-start="url(#arrS)" marker-end="url(#arr)"/><text x="814" y="451.0" fill="#f28c28" font-family="Arial" font-size="18" font-weight="700" text-anchor="start">50 мм</text><text x="130" y="738" fill="#66788a" font-family="Arial" font-size="22" font-weight="400" text-anchor="start">Стоечный профиль ПС устанавливается внутрь ПН и образует каркас перегородки. Для больших нагрузок возможна установка с шагом 400 мм или усиление стойки.</text></svg>