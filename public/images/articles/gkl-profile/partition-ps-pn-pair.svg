    <rect x="24" y="24" width="1552" height="852" rx="24" fill="#ffffff" stroke="#d7e1ea"/><text x="64" y="84" fill="#18324a" font-family="Arial" font-size="42" font-weight="700">Перегородочная пара ПС + ПН</text><text x="64" y="122" fill="#66788a" font-family="Arial" font-size="24">Как стоечный профиль работает с направляющим</text><rect x="90" y="170" width="1420" height="600" rx="20" fill="#f7fafc" stroke="#d7e1ea"/><path d="M 190 250 V 290 H 1370 V 250" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M 190 630 V 670 H 1370 V 630" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><text x="1290" y="244" fill="#18324a" font-size="24" font-family="Arial" font-weight="700">ПН</text><text x="1290" y="706" fill="#18324a" font-size="24" font-family="Arial" font-weight="700">ПН</text><path d="M 300 330 H 316 M 374 330 H 390 M 300 330 V 580 H 390 V 330" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><text x="326" y="610" fill="#18324a" font-size="22" font-family="Arial" font-weight="700">ПС</text><path d="M 570 330 H 586 M 644 330 H 660 M 570 330 V 580 H 660 V 330" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><text x="596" y="610" fill="#18324a" font-size="22" font-family="Arial" font-weight="700">ПС</text><path d="M 840 330 H 856 M 914 330 H 930 M 840 330 V 580 H 930 V 330" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><text x="866" y="610" fill="#18324a" font-size="22" font-family="Arial" font-weight="700">ПС</text><path d="M 1110 330 H 1126 M 1184 330 H 1200 M 1110 330 V 580 H 1200 V 330" fill="none" stroke="#163a59" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><text x="1136" y="610" fill="#18324a" font-size="22" font-family="Arial" font-weight="700">ПС</text><line x1="345" y1="720" x2="615" y2="720" stroke="#f