    <text x="130" y="760" fill="#5f7186" font-family="Arial" font-size="22" font-weight="400" text-anchor="start">В перегородках ПН крепится по полу и потолку, а ПС устанавливается внутрь направляющего и формирует стойки каркаса.</text></svg>