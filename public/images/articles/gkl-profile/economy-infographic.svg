<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="840" height="720" viewBox="0 0 840 720" role="img" aria-labelledby="title desc">
  <title id="title">Условная экономика профиля разной толщины</title>
  <desc id="desc">Сравнение трёх вариантов. Профиль 0,6 миллиметра — 26 тысяч рублей. 0,5 миллиметра — 33 тысячи. 0,4 миллиметра — 36 тысяч.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0B2340" flood-opacity=".10"/>
    </filter>
  </defs>
  <rect width="840" height="720" rx="24" fill="#F7FAFC"/>
  <text x="42" y="54" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="30" font-weight="700" fill="#0B2340">Считать нужно всю конструкцию</text>
  <text x="42" y="84" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="17" fill="#50677C">Условный расчёт стоечного профиля на 100 м² перегородок</text>

  <g transform="translate(32 112)">
    <rect width="776" height="150" rx="18" fill="#FFFFFF" stroke="#D8E2EA"/>
    <rect width="12" height="150" rx="6" fill="#F47A20"/>
    <circle cx="70" cy="58" r="32" fill="#0B2340"/>
    <text x="70" y="67" text-anchor="middle" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="25" font-weight="700" fill="#FFFFFF">0,6</text>
    <text x="120" y="45" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="20" font-weight="700" fill="#0B2340">Профиль 0,6 мм · шаг 600 мм</text>
    <text x="120" y="78" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="20" fill="#50677C">130 ₽/м × 200 пог. м</text>
    <text x="744" y="76" text-anchor="end" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="34" font-weight="700" fill="#0B2340">26 000 ₽</text>
    <line x1="120" y1="106" x2="744" y2="106" stroke="#E2E9EF" stroke-width="2"/>
    <text x="120" y="132" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="15" fill="#50677C">Базовый расход: 200 пог. м</text>
  </g>

  <g transform="translate(32 280)">
    <rect width="776" height="150" rx="18" fill="#FFFFFF" stroke="#D8E2EA"/>
    <rect width="12" height="150" rx="6" fill="#EBA15D"/>
    <circle cx="70" cy="58" r="32" fill="#294864"/>
    <text x="70" y="67" text-anchor="middle" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="25" font-weight="700" fill="#FFFFFF">0,5</text>
    <text x="120" y="45" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="20" font-weight="700" fill="#0B2340">Профиль 0,5 мм · шаг 400 мм</text>
    <text x="120" y="78" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="20" fill="#50677C">110 ₽/м × 300 пог. м</text>
    <text x="744" y="76" text-anchor="end" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="34" font-weight="700" fill="#0B2340">33 000 ₽</text>
    <line x1="120" y1="106" x2="744" y2="106" stroke="#E2E9EF" stroke-width="2"/>
    <text x="120" y="132" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="15" fill="#50677C">Из-за уменьшения шага расход выше на 100 пог. м</text>
  </g>

  <g transform="translate(32 448)">
    <rect width="776" height="150" rx="18" fill="#FFFFFF" stroke="#D8E2EA"/>
    <rect width="12" height="150" rx="6" fill="#B9C7D2"/>
    <circle cx="70" cy="58" r="32" fill="#50677C"/>
    <text x="70" y="67" text-anchor="middle" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="25" font-weight="700" fill="#FFFFFF">0,4</text>
    <text x="120" y="45" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="20" font-weight="700" fill="#0B2340">Профиль 0,4 мм · усиление / сдваивание</text>
    <text x="120" y="78" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="20" fill="#50677C">90 ₽/м × 400 пог. м</text>
    <text x="744" y="76" text-anchor="end" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="34" font-weight="700" fill="#0B2340">36 000 ₽</text>
    <line x1="120" y1="106" x2="744" y2="106" stroke="#E2E9EF" stroke-width="2"/>
    <text x="120" y="132" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="15" fill="#50677C">При сдваивании расход увеличивается до 400 пог. м</text>
  </g>

  <g transform="translate(32 622)">
    <rect width="776" height="66" rx="16" fill="#0B2340"/>
    <circle cx="34" cy="33" r="17" fill="#F47A20"/>
    <path d="M27 33 L32 38 L42 27" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="64" y="29" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Дешёвый метр профиля не гарантирует</text>
    <text x="64" y="51" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">дешёвую конструкцию</text>
  </g>
  <text x="808" y="708" text-anchor="end" font-family="Arial, 'DejaVu Sans', sans-serif" font-size="11" fill="#6D7F8E">Цифры условные, как в тексте статьи</text>
</svg>
