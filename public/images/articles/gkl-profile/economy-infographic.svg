    <rect x="24" y="24" width="1552" height="852" rx="24" fill="#ffffff" stroke="#d7e1ea"/><text x="64" y="84" fill="#18324a" font-family="Arial" font-size="42" font-weight="700">Условная экономика: где пропадает «экономия»</text><text x="64" y="122" fill="#66788a" font-family="Arial" font-size="24">Снижение толщины профиля не всегда делает объект дешевле</text><rect x="90" y="180" width="1420" height="610" rx="20" fill="#f7fafc" stroke="#d7e1ea"/><text x="90" y="255" fill="#18324a" font-size="28" font-family="Arial" font-weight="700">Профиль</text><text x="430" y="255" fill="#18324a" font-size="28" font-family="Arial" font-weight="700">0,6 мм</text><text x="760" y="255" fill="#18324a" font-size="28" font-family="Arial" font-weight="700">0,5 мм</text><text x="1090" y="255" fill="#18324a" font-size="28" font-family="Arial" font-weight="700">0,4 мм</text><text x="90" y="330" fill="#66788a" font-size="24" font-family="Arial">Цена за метр</text><rect x="430" y="298" width="220" height="48" rx="12" fill="#2d8a4b" opacity="0.14"/><text x="540" y="330" text-anchor="middle" fill="#2d8a4b" font-size="22" font-family="Arial" font-weight="700">выше</text><rect x="760" y="298" width="220" height="48" rx="12" fill="#346fc2" opacity="0.14"/><text x="870" y="330" text-anchor="middle" fill="#346fc2" font-size="22" font-family="Arial" font-weight="700">средне</text><rect x="1090" y="298" width="220" height="48" rx="12" fill="#cc4b37" opacity="0.14"/><text x="1200" y="330" text-anchor="middle" fill="#cc4b37" font-size="22" font-family="Arial" font-weight="700">ниже</text><text x="90" y="430" fill="#66788a" font-size="24" font-family="Arial">Потребность в усилении</text><rect x="430" y="398" width="220" height="48" rx="12" fill="#2d8a4b" opacity="0.14"/><text x="540" y="430" text-anchor="middle" fill="#2d8a4b" font-size="22" font-family="Arial" font-weight="700">редко</text><rect x="760" y="398" width="220" height="48" rx="12" fill="#346fc2" opacity="0.14"/><text x="870" y="430" text-anchor="middle" fill="#346fc2" font-size="22" font-family="Arial" font-weight="700">иногда</text><rect x="1090" y="398" width="220" height="48" rx="12" fill="#cc4b37" opacity="0.14"/><text x="1200" y="430" text-anchor="middle" fill="#cc4b37" font-size="22" font-family="Arial" font-weight="700">чаще</text><text x="90" y="530" fill="#66788a" font-size="24" font-family="Arial">Риск перерасхода</text><rect x="430" y="498" width="220" height="48" rx="12" fill="#2d8a4b" opacity="0.14"/><text x="540" y="530" text-anchor="middle" fill="#2d8a4b" font-size="22" font-family="Arial" font-weight="700">низкий</text><rect x="760" y="498" width="220" height="48" rx="12" fill="#346fc2" opacity="0.14"/><text x="870" y="530" text-anchor="middle" fill="#346fc2" font-size="22" font-family="Arial" font-weight="700">средний</text><rect x="1090" y="498" width="220" height="48" rx="12" fill="#cc4b37" opacity="0.14"/><text x="1200" y="530" text-anchor="middle" fill="#cc4b37" font-size="22" font-family="Arial" font-weight="700">выше</text><text x="90" y="630" fill="#66788a" font-size="24" font-family="Arial">Итог по объекту</text><rect x="430" y="598" width="220" height="48" rx="12" fill="#2d8a4b" opacity="0.14"/><text x="540" y="630" text-anchor="middle" fill="#2d8a4b" font-size="22" font-family="Arial" font-weight="700">стабильный</text><rect x="760" y="598" width="220" height="48" rx="12" fill="#346fc2" opacity="0.14"/><text x="870" y="630" text-anchor="middle" fill="#346fc2" font-size="22" font-family="Arial" font-weight="700">ситуативно</text><rect x="1090" y="598" width="220" height="48" rx="12" fill="#cc4b37" opacity="0.14"/><text x="1200" y="630" text-anchor="middle" fill="#cc4b37" font-size="22" font-family="Arial" font-weight="700">не всегда дешевле</text><text x="90" y="845" fill="#66788a" font-size="20" font-family="Arial">Если из-за более тонкого профиля приходится уменьшать шаг стоек, сдваивать элементы или переделывать узлы, видимая экономия быстро исчезает.</text>
