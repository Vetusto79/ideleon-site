    <text x="370.0" y="647" text-anchor="middle" fill="#f28c28" font-family="Arial" font-size="18" font-weight="700">60 мм</text><line x1="1040" y1="498" x2="1040" y2="655" stroke="#f28c28" stroke-width="2"/>
    <line x1="1280" y1="498" x2="1280" y2="655" stroke="#f28c28" stroke-width="2"/>
    <line x1="1040" y1="655" x2="1280" y2="655" stroke="#f28c28" stroke-width="2.5" marker-start="url(#arrS)" marker-end="url(#arr)"/>
    <text x="1160.0" y="647" text-anchor="middle" fill="#f28c28" font-family="Arial" font-size="18" font-weight="700">28 мм</text><line x1="1280" y1="320" x2="1320" y2="320" stroke="#f28c28" stroke-width="2"/>
    <line x1="1280" y1="498" x2="1320" y2="498" stroke="#f28c28" stroke-width="2"/>
    <line x1="1320" y1="320" x2="1320" y2="498" stroke="#f28c28" stroke-width="2.5" marker-start="url(#arrS)" marker-end="url(#arr)"/>
    <text x="1332" y="415.0" fill="#f28c28" font-family="Arial" font-size="18" font-weight="700">27 мм</text><text x="120" y="818" fill="#66788a" font-size="22" font-family="Arial">ППН крепится по периметру помещения, а ПП входит в него торцами и формирует рабочую плоскость потолочного каркаса.</text>
