    <path d="M 1040 320 V 498 H 1280 V 320" fill="none" stroke="#163a59" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/><text x="300" y="565" fill="#18324a" font-size="34" font-family="Arial" font-weight="700">ПП 60×27</text><text x="1060" y="565" fill="#18324a" font-size="34" font-family="Arial" font-weight="700">ППН 28×27</text><line x1="560" y1="430" x2="975" y2="430" stroke="#f28c28" stroke-width="6" marker-end="url(#arr)"/><text x="620" y="398" fill="#f28c28" font-size="28" font-family="Arial" font-weight="700">Торец ПП заводится внутрь ППН</text><line x1="220" y1="498" x2="220" y2="655" stroke="#f28c28" stroke-width="2"/>
    <line x1="520" y1="498" x2="520" y2="655" stroke="#f28c28" stroke-width="2"/>
