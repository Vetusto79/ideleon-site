<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <rect x="40" y="40" width="1520" height="900" rx="26" fill="#f7fafc" stroke="#d7e1ea" stroke-width="2"/>
  <text x="90" y="115" fill="#17324d" font-family="Arial" font-size="46" font-weight="700">Сопряжение ПП 60×27 с ППН 28×27</text>
  <text x="90" y="160" fill="#5f7186" font-family="Arial" font-size="24">Схема стыковки потолочного профиля с направляющим по образцу из ТУ Албес</text>

  <text x="110" y="235" fill="#17324d" font-family="Arial" font-size="28" font-weight="700">Вариант 1. ПП 60×27 и ППН 28×27</text>
  <text x="820" y="235" fill="#17324d" font-family="Arial" font-size="28" font-weight="700">Вариант 2. Усиленный профиль в направляющем</text>

  <!-- top left label lines -->
  <text x="180" y="290" fill="#5f7186" font-family="Arial" font-size="20">Потолочный профиль ПП 60×27</text>
  <line x1="330" y1="295" x2="430" y2="380" stroke="#5f7186" stroke-width="2"/>
  <text x="510" y="505" fill="#5f7186" font-family="Arial" font-size="20">Направляющий ППН 28×27</text>
  <line x1="700" y1="500" x2="690" y2="450" stroke="#5f7186" stroke-width="2"/>

  <!-- top left isometric drawing -->
  <!-- PPN outer -->
  <polygon points="620,430 840,350 1030,430 810,510" fill="none" stroke="#173a5e" stroke-width="4"/>
  <polyline points="620,430 620,485 810,565 810,510" fill="none" stroke="#173a5e" stroke-width="4"/>
  <polyline points="1030,430 1030,485 810,565" fill="none" stroke="#173a5e" stroke-width="4"/>
  <polyline points="665,414 665,460 810,520 810,475 985,410" fill="none" stroke="#173a5e" stroke-width="4"/>
  <!-- PP inserted -->
  <polygon points="360,380 570,305 760,385 550,460" fill="none" stroke="#f28a1f" stroke-width="4"/>
  <polyline points="360,380 360,420 550,500 550,460" fill="none" stroke="#f28a1f" stroke-width="4"/>
  <polyline points="760,385 760,425 550,500" fill="none" stroke="#f28a1f" stroke-width="4"/>
  <polyline points="400,365 400,398 550,460 550,427 720,365" fill="none" stroke="#f28a1f" stroke-width="4"/>
  <!-- show overlap with ppn -->
  <polygon points="550,460 760,385 820,410 610,485" fill="none" stroke="#f28a1f" stroke-width="4"/>
  <polyline points="610,485 610,525 800,605 800,565" fill="none" stroke="#f28a1f" stroke-width="4"/>
  <polyline points="820,410 820,450 800,458" fill="none" stroke="#f28a1f" stroke-width="4"/>
  <polyline points="585,445 585,477 730,537 730,505 785,485" fill="none" stroke="#f28a1f" stroke-width="4"/>

  <text x="130" y="650" fill="#17324d" font-family="Arial" font-size="22" font-weight="700">Логика узла:</text>
  <text x="130" y="690" fill="#5f7186" font-family="Arial" font-size="22">1. Торец ПП 60×27 подводится к периметру.</text>
  <text x="130" y="725" fill="#5f7186" font-family="Arial" font-size="22">2. Профиль заводится внутрь ППН 28×27.</text>
  <text x="130" y="760" fill="#5f7186" font-family="Arial" font-size="22">3. ППН принимает торец ПП и формирует контур потолочного каркаса.</text>

  <!-- right block labels -->
  <text x="980" y="290" fill="#5f7186" font-family="Arial" font-size="20">Потолочный профиль ПП 60×27, усиленный</text>
  <line x1="1215" y1="295" x2="1280" y2="380" stroke="#5f7186" stroke-width="2"/>
  <text x="1240" y="505" fill="#5f7186" font-family="Arial" font-size="20">Направляющий ППН 28×27</text>
  <line x1="1420" y1="500" x2="1410" y2="450" stroke="#5f7186" stroke-width="2"/>

  <!-- top right PPN outer -->
  <polygon points="1160,430 1380,350 1540,415 1320,495" fill="none" stroke="#173a5e" stroke-width="4"/>
  <polyline points="1160,430 1160,485 1320,550 1320,495" fill="none" stroke="#173a5e" stroke-width="4"/>
  <polyline points="1540,415 1540,470 1320,550" fill="none" stroke="#173a5e" stroke-width="4"/>
  <polyline points="1198,416 1198,460 1320,510 1320,468 1502,402" fill="none" stroke="#173a5e" stroke-width="4"/>
  <!-- top right double PP inserted -->
  <polygon points="980,378 1185,306 1340,370 1135,442" fill="none" stroke="#f28a1f" stroke-width="4"/>
  <polyline points="980,378 980,415 1135,478 1135,442" fill="none" stroke="#f28a1f" stroke-width="4"/>
  <polyline points="1340,370 1340,406 1135,478" fill="none" stroke="#f28a1f" stroke-width="4"/>
  <polyline points="1015,365 1015,394 1135,442 1135,412 1304,353" fill="none" stroke="#f28a1f" stroke-width="4"/>
  <polygon points="1005,360 1210,288 1365,352 1160,424" fill="none" stroke="#f28a1f" stroke-width="4"/>
  <polyline points="1005,360 1005,397 1160,460 1160,424" fill="none" stroke="#f28a1f" stroke-width="4"/>
  <polyline points="1365,352 1365,388 1160,460" fill="none" stroke="#f28a1f" stroke-width="4"/>
  <polyline points="1040,347 1040,376 1160,424 1160,394 1329,335" fill="none" stroke="#f28a1f" stroke-width="4"/>
  <!-- overlap part -->
  <polygon points="1160,424 1365,352 1415,372 1210,444" fill="none" stroke="#f28a1f" stroke-width="4"/>
  <polyline points="1210,444 1210,482 1365,545 1365,508" fill="none" stroke="#f28a1f" stroke-width="4"/>
  <polygon points="1135,442 1340,370 1390,390 1185,462" fill="none" stroke="#f28a1f" stroke-width="4"/>
  <polyline points="1185,462 1185,500 1340,563 1340,526" fill="none" stroke="#f28a1f" stroke-width="4"/>

  <text x="885" y="650" fill="#17324d" font-family="Arial" font-size="22" font-weight="700">Что важно:</text>
  <text x="885" y="690" fill="#5f7186" font-family="Arial" font-size="22">• ПП входит в ППН продольно, а не «кладётся» сверху в плоском виде.</text>
  <text x="885" y="725" fill="#5f7186" font-family="Arial" font-size="22">• У направляющего остаётся П-образная геометрия, принимающая торец профиля.</text>
  <text x="885" y="760" fill="#5f7186" font-family="Arial" font-size="22">• Для статьи оставлен понятный технический рисунок без лишней самодеятельности.</text>

  <line x1="790" y1="195" x2="790" y2="820" stroke="#d7e1ea" stroke-width="2"/>
</svg>