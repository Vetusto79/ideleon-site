<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none"><rect width="1600" height="900" fill="#ffffff"/><rect x="24" y="24" width="1552" height="852" rx="24" fill="#ffffff" stroke="#d9e3ec" stroke-width="2"/><text x="80" y="90" fill="#12324a" font-size="40" font-family="Arial" font-weight="700">Как ПП 60×27 входит в ППН 28×27</text><text x="80" y="130" fill="#6b7785" font-size="22" font-family="Arial">Схема примыкания потолочного профиля к направляющему</text><rect x="110" y="190" width="1380" height="580" rx="24" fill="#f5f8fb" stroke="#d9e3ec"/><rect x="210" y="300" width="980" height="110" rx="10" fill="#ffffff" stroke="#12324a" stroke-width="14"/><path d="M 260 330 H 1040 V 370 H 975 V 445 H 925 V 370 H 260 Z" fill="none" stroke="#2a6ea6" stroke-width="14" stroke-linejoin="round"/><path d="M 1120 250 V 460 H 1320 V 250" fill="none" stroke="#12324a" stroke-width="14" stroke-linejoin="round"/><path d="M 980 350 H 1110" stroke="#f28c28" stroke-width="8" marker-end="url(#ar2)"/><text x="760" y="335" fill="#f28c28" font-size="26" font-family="Arial" font-weight="700">Торец ПП 60×27 входит в ППН</text><text x="260" y="510" fill="#12324a" font-size="30" font-family="Arial" font-weight="700">ПП 60×27</text><text x="1110" y="510" fill="#12324a" font-size="30" font-family="Arial" font-weight="700">ППН 28×27</text><text x="240" y="585" fill="#6b7785" font-size="22" font-family="Arial">Направляющий профиль крепится по периметру и принимает концы рабочих ПП-профилей.</text><defs><marker id="ar2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#f28c28"/></marker></defs></svg>