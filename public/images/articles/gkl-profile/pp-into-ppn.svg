<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#ffffff"/><defs><marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,4 L8,0 L8,8 Z" fill="#f28c28"/></marker><marker id="arrS" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M8,4 L0,0 L0,8 Z" fill="#f28c28"/></marker></defs><text x="48" y="66" fill="#18324a" font-family="Arial" font-size="40" font-weight="700" text-anchor="start">Как ПП 60×27 входит в ППН 28×27</text><text x="48" y="104" fill="#66788a" font-family="Arial" font-size="22" font-weight="400" text-anchor="start">Схема стыковки потолочного профиля с направляющим</text><rect x="80" y="150" width="1440" height="640" rx="24" fill="#f7fafc" stroke="#d7e1ea" stroke-width="2"/><text x="130" y="210" fill="#18324a" font-family="Arial" font-size="24" font-weight="700" text-anchor="start">1. ПП 60×27 подходит к направляющему</text><path d="M 198 360 H 382 q 8 0 8 8 v 8 q 0 8 -8 8 h -61.6 v 54 q 0 8 -8 8 h -39.6 q -8 0 -8 -8 v -54 h -61.6 q -8 0 -8 -8 v -8 q 0 -8 8 -8" fill="none" stroke="#183b5b" stroke-width="10" stroke-linejoin="round" stroke-linecap="round"/><line x1="180" y1="376" x2="180" y2="470" stroke="#183b5b" stroke-width="10" stroke-linecap="round"/><line x1="400" y1="376" x2="400" y2="470" stroke="#183b5b" stroke-width="10" stroke-linecap="round"/><line x1="180" y1="470" x2="400" y2="470" stroke="#183b5b" stroke-width="10" stroke-linecap="round"/><path d="M 227.60000000000002 470 q 7 -12 14 0" fill="none" stroke="#183b5b" stroke-width="7" stroke-linecap="round"/><path d="M 276.0 470 q 7 -12 14 0" fill="none" stroke="#183b5b" stroke-width="7" stroke-linecap="round"/><path d="M 324.4 470 q 7 -12 14 0" fill="none" stroke="#183b5b" stroke-width="7" stroke-linecap="round"/><path d="M 520 360 V 465 H 700 V 360" fill="none" stroke="#183b5b" stroke-width="10" stroke-linejoin="round" stroke-linecap="round"/><line x1="430" y1="413" x2="500" y2="413" stroke="#f28c28" stroke-width="4" marker-end="url(#arr)"/><text x="860" y="210" fill="#18324a" font-family="Arial" font-size="24" font-weight="700" text-anchor="start">2. Торец ПП заводится в ППН</text><path d="M 1030 330 V 520 H 1310 V 330" fill="none" stroke="#183b5b" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/><path d="M 1085 355 H 1120 M 1220 355 H 1255 q 8 0 8 8 v 8 q 0 8 -8 8 h -55 v 72 q 0 8 -8 8 h -64 q -8 0 -8 -8 v -72 h -55 q -8 0 -8 -8 v -8 q 0 -8 8 -8 h 35" fill="none" stroke="#f28c28" stroke-width="10" stroke-linejoin="round" stroke-linecap="round" opacity="0.95"/><line x1="1030" y1="544" x2="1030" y2="576" stroke="#f28c28" stroke-width="2"/><line x1="1310" y1="544" x2="1310" y2="576" stroke="#f28c28" stroke-width="2"/><line x1="1030" y1="560" x2="1310" y2="560" stroke="#f28c28" stroke-width="2.5" marker-start="url(#arrS)" marker-end="url(#arr)"/><text x="1170.0" y="552" fill="#f28c28" font-family="Arial" font-size="18" font-weight="700" text-anchor="middle">28 мм</text><line x1="1085" y1="604" x2="1085" y2="636" stroke="#f28c28" stroke-width="2"/><line x1="1255" y1="604" x2="1255" y2="636" stroke="#f28c28" stroke-width="2"/><line x1="1085" y1="620" x2="1255" y2="620" stroke="#f28c28" stroke-width="2.5" marker-start="url(#arrS)" marker-end="url(#arr)"/><text x="1170.0" y="612" fill="#f28c28" font-family="Arial" font-size="18" font-weight="700" text-anchor="middle">60 мм</text><text x="170" y="720" fill="#66788a" font-family="Arial" font-size="24" font-weight="400" text-anchor="start">По ТУ Албес ПП 60×27 используется как несущий профиль, а ППН 28×27 — как направляющий контур по периметру.</text></svg>