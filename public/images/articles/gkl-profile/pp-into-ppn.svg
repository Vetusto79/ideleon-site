<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
    <rect width="100%" height="100%" fill="#ffffff"/>
    <defs>
      <marker id="arrowEnd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#f28a1f" />
      </marker>
    </defs>
    <text x="48" y="64" fill="#17324d" font-family="Arial" font-size="40" font-weight="700" text-anchor="start">Как ПП 60×27 входит в ППН 28×27</text><text x="48" y="102" fill="#5f7186" font-family="Arial" font-size="22" font-weight="400" text-anchor="start">Стыковка потолочного профиля с направляющим по периметру</text><rect x="80" y="150" width="1440" height="660" rx="22" fill="#f7fafc" stroke="#d7e1ea" stroke-width="2"/><text x="130" y="210" fill="#17324d" font-family="Arial" font-size="24" font-weight="700" text-anchor="start">1. ПП подводится к направляющему</text><path d="M 204 380 H 190 Q 180 380 180 394 V 475" fill="none" stroke="#173a5e" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/><path d="M 376 380 H 390 Q 400 380 400 394 V 475" fill="none" stroke="#173a5e" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/><line x1="180" y1="475" x2="400" y2="475" stroke="#173a5e" stroke-width="8" stroke-linecap="round"/><path d="M 222.8 475 q 5.0 -7 10.0 0 q 5.0 7 10.0 0" fill="none" stroke="#173a5e" stroke-width="6" stroke-linecap="round"/><path d="M 280.0 475 q 5.0 -7 10.0 0 q 5.0 7 10.0 0" fill="none" stroke="#173a5e" stroke-width="6" stroke-linecap="round"/><path d="M 337.2 475 q 5.0 -7 10.0 0 q 5.0 7 10.0 0" fill="none" stroke="#173a5e" stroke-width="6" stroke-linecap="round"/><path d="M 520 385 V 475 H 700 V 385" fill="none" stroke="#173a5e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><line x1="520" y1="475" x2="700" y2="475" stroke="#173a5e" stroke-width="8" stroke-linecap="round"/><line x1="425" y1="430" x2="505" y2="430" stroke="#f28a1f" stroke-width="4" marker-end="url(#arrowEnd)"/><text x="860" y="210" fill="#17324d" font-family="Arial" font-size="24" font-weight="700" text-anchor="start">2. Торец ПП заводится в ППН</text><path d="M 1035 360 V 455 H 1255 V 360" fill="none" stroke="#173a5e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><line x1="1035" y1="455" x2="1255" y2="455" stroke="#173a5e" stroke-width="8" stroke-linecap="round"/><path d="M 1089 355 H 1075 Q 1065 355 1065 369 V 425" fill="none" stroke="#f28a1f" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/><path d="M 1201 355 H 1215 Q 1225 355 1225 369 V 425" fill="none" stroke="#f28a1f" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/><line x1="1065" y1="425" x2="1225" y2="425" stroke="#f28a1f" stroke-width="8" stroke-linecap="round"/><path d="M 1093.4 425 q 5.0 -7 10.0 0 q 5.0 7 10.0 0" fill="none" stroke="#f28a1f" stroke-width="6" stroke-linecap="round"/><path d="M 1135.0 425 q 5.0 -7 10.0 0 q 5.0 7 10.0 0" fill="none" stroke="#f28a1f" stroke-width="6" stroke-linecap="round"/><path d="M 1176.6 425 q 5.0 -7 10.0 0 q 5.0 7 10.0 0" fill="none" stroke="#f28a1f" stroke-width="6" stroke-linecap="round"/><text x="1280" y="390" fill="#17324d" font-family="Arial" font-size="22" font-weight="700" text-anchor="start">ППН 28×27</text><text x="1280" y="430" fill="#5f7186" font-family="Arial" font-size="18" font-weight="400" text-anchor="start">принимает торец ПП</text><text x="1280" y="500" fill="#f28a1f" font-family="Arial" font-size="22" font-weight="700" text-anchor="start">ПП 60×27</text><text x="1280" y="540" fill="#5f7186" font-family="Arial" font-size="18" font-weight="400" text-anchor="start">несущий потолочный профиль</text><text x="130" y="760" fill="#5f7186" font-family="Arial" font-size="22" font-weight="400" text-anchor="start">В рабочем узле ПП 60×27 заходит в ППН 28×27 и образует жёсткий контур потолочного каркаса по периметру помещения.</text></svg>