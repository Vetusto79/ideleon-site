    <rect x="24" y="24" width="1552" height="852" rx="24" fill="#ffffff" stroke="#d7e1ea"/><text x="64" y="84" fill="#18324a" font-family="Arial" font-size="42" font-weight="700">Как ПП 60×27 входит в ППН 28×27</text><text x="64" y="122" fill="#66788a" font-family="Arial" font-size="24">Схема примыкания потолочного профиля к направляющему</text><rect x="90" y="180" width="1420" height="590" rx="20" fill="#f7fafc" stroke="#d7e1ea"/>
    <path d="M 220 360 H 258 M 482 360 H 520
