<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none"><rect width="1600" height="900" fill="#ffffff"/><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto"><path d="M0,5 L10,0 L10,10 Z" fill="#f28c28"/></marker><marker id="arrowStart" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto"><path d="M10,5 L0,0 L0,10 Z" fill="#f28c28"/></marker></defs><rect x="24" y="24" width="1552" height="852" rx="24" fill="#ffffff" stroke="#d6e0ea"/><text x="70" y="90" fill="#12324a" font-size="42" font-family="Arial" font-weight="700">Как ПП 60×27 входит в ППН 28×27</text><text x="70" y="128" fill="#627285" font-size="24" font-family="Arial">Схема примыкания потолочного профиля к направляющему</text><rect x="90" y="190" width="1420" height="560" rx="22" fill="#f6f9fc" stroke="#d6e0ea"/><path d="M 240 365 V 515 H 540 V 365" stroke="#12324a" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/><line x1="240" y1="365" x2="282" y2="365" stroke="#12324a" stroke-width="16" stroke-linecap="round"/><line x1="498" y1="365" x2="540" y2="365" stroke="#12324a" stroke-width="16" stroke-linecap="round"/><path d="M 1030 330 V 515 H 1270 V 330" stroke="#12324a" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/><text x="280" y="585" fill="#12324a" font-size="34" font-family="Arial" font-weight="700">ПП 60×27</text><text x="1040" y="585" fill="#12324a" font-size="34" font-family="Arial" font-weight="700">ППН 28×27</text><line x1="575" y1="440" x2="980" y2="440" stroke="#f28c28" stroke-width="8" marker-end="url(#arrow)"/><text x="620" y="408" fill="#f28c28" font-size="28" font-family="Arial" font-weight="700">Торец ПП заводится внутрь ППН</text><line x1="240" y1="515" x2="240" y2="690" stroke="#f28c28" stroke-width="2"/><line x1="540" y1="515" x2="540" y2="690" stroke="#f28c28" stroke-width="2"/><line x1="240" y1="690" x2="540" y2="690" stroke="#f28c28" stroke-width="3" marker-start="url(#arrowStart)" marker-end="url(#arrow)"/><text x="390.0" y="682" fill="#f28c28" font-size="20" font-family="Arial" font-weight="700" text-anchor="middle">60 мм</text><line x1="1030" y1="515" x2="1030" y2="690" stroke="#f28c28" stroke-width="2"/><line x1="1270" y1="515" x2="1270" y2="690" stroke="#f28c28" stroke-width="2"/><line x1="1030" y1="690" x2="1270" y2="690" stroke="#f28c28" stroke-width="3" marker-start="url(#arrowStart)" marker-end="url(#arrow)"/><text x="1150.0" y="682" fill="#f28c28" font-size="20" font-family="Arial" font-weight="700" text-anchor="middle">28 мм</text><line x1="1270" y1="330" x2="1318" y2="330" stroke="#f28c28" stroke-width="2"/><line x1="1270" y1="515" x2="1318" y2="515" stroke="#f28c28" stroke-width="2"/><line x1="1318" y1="330" x2="1318" y2="515" stroke="#f28c28" stroke-width="3" marker-start="url(#arrowStart)" marker-end="url(#arrow)"/><text x="1332" y="428.5" fill="#f28c28" font-size="20" font-family="Arial" font-weight="700">27 мм</text><text x="130" y="820" fill="#627285" font-size="22" font-family="Arial">ППН крепится по периметру помещения, а ПП входит в него торцами и формирует рабочую плоскость потолочного каркаса.</text></svg>