<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#ffffff"/><defs><marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,4 L8,0 L8,8 Z" fill="#f28c28"/></marker><marker id="arrS" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M8,4 L0,0 L0,8 Z" fill="#f28c28"/></marker></defs><rect x="24" y="24" width="1552" height="852" rx="24" fill="#ffffff" stroke="#d7e1ea"/><text x="64" y="84" fill="#18324a" font-family="Arial" font-size="42" font-weight="700">Сравнение толщин профиля: 0,6 / 0,5 / 0,4 мм</text><text x="64" y="122" fill="#66788a" font-family="Arial" font-size="24">Как меняется жёсткость и запас прочности</text><rect x="90" y="180" width="390" height="620" rx="20" fill="#f7fafc" stroke="#d7e1ea"/><text x="285" y="235" text-anchor="middle" fill="#18324a" font-size="32" font-family="Arial" font-weight="700">0,6 мм</text><rect x="245" y="260" width="80" height="340" rx="10" fill="#2d8a4b" opacity="0.12" stroke="#2d8a4b" stroke-width="2"/><rect x="276.0" y="280" width="18" height="300" rx="5" fill="#2d8a4b"/><text x="285" y="650" text-anchor="middle" fill="#2d8a4b" font-size="26" font-family="Arial" font-weight="700">Оптимально</text><text x="285" y="695" text-anchor="middle" fill="#66788a" font-size="18" font-family="Arial">Держит форму,</text><text x="285" y="720" text-anchor="middle" fill="#66788a" font-size="18" font-family="Arial">меньше риск деформации</text><rect x="560" y="180" width="390" height="620" rx="20" fill="#f7fafc" stroke="#d7e1ea"/><text x="755" y="235" text-anchor="middle" fill="#18324a" font-size="32" font-family="Arial" font-weight="700">0,5 мм</text><rect x="715" y="260" width="80" height="340" rx="10" fill="#346fc2" opacity="0.12" stroke="#346fc2" stroke-width="2"/><rect x="748.0" y="280" width="14" height="300" rx="5" fill="#346fc2"/><text x="755" y="650" text-anchor="middle" fill="#346fc2" font-size="26" font-family="Arial" font-weight="700">Компромисс</text><text x="755" y="695" text-anchor="middle" fill="#66788a" font-size="18" font-family="Arial">Подходит для спокойных</text><text x="755" y="720" text-anchor="middle" fill="#66788a" font-size="18" font-family="Arial">узлов и умеренной нагрузки</text><rect x="1030" y="180" width="390" height="620" rx="20" fill="#f7fafc" stroke="#d7e1ea"/><text x="1225" y="235" text-anchor="middle" fill="#18324a" font-size="32" font-family="Arial" font-weight="700">0,4 мм</text><rect x="1185" y="260" width="80" height="340" rx="10" fill="#cc4b37" opacity="0.12" stroke="#cc4b37" stroke-width="2"/><rect x="1220.0" y="280" width="10" height="300" rx="5" fill="#cc4b37"/><text x="1225" y="650" text-anchor="middle" fill="#cc4b37" font-size="26" font-family="Arial" font-weight="700">Требует осторожности</text><text x="1225" y="695" text-anchor="middle" fill="#66788a" font-size="18" font-family="Arial">Чаще нужен меньший шаг</text><text x="1225" y="720" text-anchor="middle" fill="#66788a" font-size="18" font-family="Arial">стоек или усиление</text><text x="90" y="845" fill="#66788a" font-size="20" font-family="Arial">Для коммерческих объектов и ответственных узлов обычно ориентируются на профиль 0,6 мм. Более тонкие варианты часто требуют дополнительных мер.</text></svg>