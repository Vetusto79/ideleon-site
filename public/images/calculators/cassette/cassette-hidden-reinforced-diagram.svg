<path d="M565 232 H635 M555 298 H645" stroke="#ff6a00" stroke-width="8"/>
<text x="600" y="410" text-anchor="middle" fill="#334155" font-family="Arial, sans-serif" font-size="25" font-weight="700">ПП-1-2 + двухуровневый соединитель + ВТ-600 + кассета</text>
</svg>
