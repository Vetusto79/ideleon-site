<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1a2e"/><stop offset="1" stop-color="#14243c"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8fa"/><stop offset="0.42" stop-color="#d4d9df"/><stop offset="1" stop-color="#8f99a5"/>
    </linearGradient>
    <linearGradient id="metal2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#aeb6c0"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#6e7f95" stroke-width="1" opacity=".12"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".35"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff6a00"/>
    </marker>
  </defs>
  <rect width="1200" height="675" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="675" rx="34" fill="url(#grid)"/>
  <rect x="28" y="28" width="1144" height="619" rx="26" fill="none" stroke="#ff6a00" stroke-width="2" opacity=".55"/>
  <text x="80" y="82" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#f5f7fb">A25/35/S</text>
  <text x="80" y="116" font-family="Arial, sans-serif" font-size="18" fill="#9fb0c5">СЕЧЕНИЕ + ОБЪЁМНЫЙ ВИД</text>

  <!-- technical cross-section -->
  <g>
    <text x="90" y="165" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ff6a00">Сечение</text>
    <path d="M 172.5 251.5 V 398.5 H 185.1 V 264.1 H 264.9 V 398.5 H 277.5 V 251.5 Z" fill="url(#metal2)" stroke="#eff3f7" stroke-width="3"/>
    <line x1="172.5" y1="446.5" x2="277.5" y2="446.5" stroke="#ff6a00" stroke-width="2.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="172.5" y1="416.5" x2="172.5" y2="462.5" stroke="#9fb0c5" stroke-width="2"/>
    <line x1="277.5" y1="416.5" x2="277.5" y2="462.5" stroke="#9fb0c5" stroke-width="2"/>
    <text x="225.0" y="484.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#f5f7fb">25 мм</text>
    <line x1="124.5" y1="251.5" x2="124.5" y2="398.5" stroke="#ff6a00" stroke-width="2.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="108.5" y1="251.5" x2="160.5" y2="251.5" stroke="#9fb0c5" stroke-width="2"/>
    <line x1="108.5" y1="398.5" x2="160.5" y2="398.5" stroke="#9fb0c5" stroke-width="2"/>
    <text x="99.5" y="325.0" transform="rotate(-90 99.5 325.0)" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#f5f7fb">35 мм</text>
  </g>

  <!-- 3D extrusion -->
  <g filter="url(#shadow)">
    <polygon points="475.0,115.0 545.0,115.0 795.0,265.0 725.0,265.0" fill="url(#metal)" stroke="#f6f8fa" stroke-width="2"/>
    <polygon points="475.0,115.0 725.0,265.0 725.0,335.0 475.0,185.0" fill="#b3bbc5" stroke="#e7ebef" stroke-width="2"/>
    <polygon points="545.0,115.0 795.0,265.0 795.0,335.0 545.0,185.0" fill="#7f8995" stroke="#dfe4e9" stroke-width="2"/>
    <polygon points="493.0,133.0 527.0,133.0 777.0,283.0 743.0,283.0" fill="#586575" stroke="#cfd6de" stroke-width="2"/>
    <path d="M 725.0,265.0 H 795.0 V 335.0 H 777.0 V 283.0 H 743.0 V 335.0 H 725.0 Z" fill="url(#metal2)" stroke="#f7f8fa" stroke-width="3"/>
    <path d="M 743.0,283.0 H 777.0" stroke="#737e8a" stroke-width="3"/>
  </g>
  <line x1="650" y1="555" x2="1070" y2="555" stroke="#ff6a00" stroke-width="3" opacity=".8"/>
  <text x="860" y="596" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#c7d1dc">длина 3000 / 4000 мм</text>
</svg>